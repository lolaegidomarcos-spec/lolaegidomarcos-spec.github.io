<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Lista de Deseos</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #E2DDD6;
    --text: #1A1714;
    --text2: #6B6460;
    --text3: #A09890;
    --accent: #C0392B;
    --accent-light: #FADBD8;
    --gold: #D4AC0D;
    --gold-light: #FEF9E7;
    --green: #1E8449;
    --green-light: #D5F5E3;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  .header {
    background: var(--text);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 300;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .logo span { color: #E8C87A; font-style: italic; }
  .header-stats {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.55);
  }
  .header-stats strong { color: #fff; font-weight: 500; }

  /* TOOLBAR */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .sort-label { font-size: 12px; color: var(--text3); margin-right: 4px; }
  .sort-btn {
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn:hover { border-color: var(--text); color: var(--text); }
  .sort-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
  .spacer { flex: 1; }
  .upload-btn {
    padding: 8px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 99px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.15s;
    position: relative;
  }
  .upload-btn:hover { opacity: 0.88; }
  .upload-btn input {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  /* VIEW TOGGLES */
  .view-toggle { display: flex; gap: 4px; margin-left: 8px; }
  .view-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--border);
    background: transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text3);
    font-size: 16px;
    transition: all 0.12s;
  }
  .view-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* MAIN LAYOUT */
  .main { padding: 28px 32px; }

  /* UPLOAD ZONE */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 28px;
    background: var(--surface);
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #FDF0EF; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-zone svg { margin-bottom: 12px; color: var(--text3); }
  .upload-zone h3 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 18px; margin-bottom: 6px; }
  .upload-zone p { font-size: 13px; color: var(--text3); }

  /* GRID */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .products-grid.list-view { grid-template-columns: 1fr; }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty svg { margin: 0 auto 16px; display: block; }
  .empty h3 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 300; color: var(--text2); margin-bottom: 8px; }

  /* PRODUCT CARD */
  .product-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: fadeIn 0.3s ease;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .product-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.08); transform: translateY(-2px); }
  @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

  .card-img-wrap {
    position: relative;
    aspect-ratio: 4/3;
    background: var(--surface2);
    overflow: hidden;
  }
  .card-img { width: 100%; height: 100%; object-fit: cover; }
  .card-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--text3);
  }
  .card-badge {
    position: absolute;
    top: 10px; left: 10px;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-analyzing { background: rgba(255,255,255,0.92); color: var(--text2); }
  .badge-searching { background: rgba(255,255,255,0.92); color: var(--text2); }
  .badge-done { background: var(--green-light); color: var(--green); }
  .card-remove {
    position: absolute;
    top: 8px; right: 8px;
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.9);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2);
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .product-card:hover .card-remove { opacity: 1; }
  .card-remove:hover { background: #fff; color: var(--accent); }

  .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card-name {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.3;
    color: var(--text);
  }
  .card-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }
  .card-category {
    display: inline-block;
    padding: 2px 10px;
    background: var(--surface2);
    border-radius: 99px;
    font-size: 11px;
    color: var(--text3);
    width: fit-content;
  }

  /* PRICES */
  .card-prices { border-top: 1px solid var(--border); padding: 12px 16px; }
  .prices-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .price-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid var(--surface2);
  }
  .price-row:last-child { border-bottom: none; }
  .price-rank {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .r1 { background: var(--gold-light); color: var(--gold); }
  .r2 { background: #F4F4F4; color: #888; }
  .r3 { background: #F4F4F4; color: #888; }
  .price-store { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
  .price-amount { font-size: 14px; font-weight: 700; color: var(--accent); }
  .price-link {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text3);
    text-decoration: none;
    font-size: 13px;
    transition: all 0.12s;
  }
  .price-link:hover { border-color: var(--text); color: var(--text); background: var(--surface2); }
  .price-note { font-size: 11px; color: var(--text3); margin-top: 8px; line-height: 1.4; }
  .prices-loading { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text3); padding: 4px 0; }
  .pulse { animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  .refresh-btn {
    width: 100%;
    padding: 8px;
    border: 1px solid var(--border);
    background: transparent;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.12s;
  }
  .refresh-btn:hover { border-color: var(--text); color: var(--text); background: var(--surface2); }

  /* BUY BUTTON */
  .buy-btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    margin-top: 12px;
    transition: opacity 0.15s;
  }
  .buy-btn:hover { opacity: 0.85; }
  .buy-btn:disabled { opacity: 0.4; cursor: default; }

  /* LIST VIEW */
  .products-grid.list-view .product-card { flex-direction: row; }
  .products-grid.list-view .card-img-wrap { width: 160px; min-width: 160px; aspect-ratio: auto; height: auto; }
  .products-grid.list-view .card-body { padding: 16px; }
  .products-grid.list-view .card-prices { border-top: none; border-left: 1px solid var(--border); min-width: 260px; }

  /* STORES VIEW */
  .stores-section { margin-bottom: 32px; }
  .store-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--text);
  }
  .store-name { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; }
  .store-count { font-size: 12px; color: var(--text3); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    max-width: 480px;
    width: 100%;
    overflow: hidden;
  }
  .modal-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
  .modal-body { padding: 24px; }
  .modal-name { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; margin-bottom: 8px; }
  .modal-desc { color: var(--text2); margin-bottom: 16px; line-height: 1.6; }
  .modal-close {
    float: right;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: var(--text3);
    margin-top: -4px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">mi lista de <span>deseos</span></div>
  <div class="header-stats">
    <span>Productos: <strong id="statCount">0</strong></span>
    <span>Guardado: <strong id="statSaved">ahora</strong></span>
  </div>
</div>

<div class="toolbar">
  <span class="sort-label">Ordenar:</span>
  <button class="sort-btn active" onclick="setSort('added')" id="sort-added">Añadido</button>
  <button class="sort-btn" onclick="setSort('price-asc')" id="sort-price-asc">Precio ↑</button>
  <button class="sort-btn" onclick="setSort('price-desc')" id="sort-price-desc">Precio ↓</button>
  <button class="sort-btn" onclick="setSort('name')" id="sort-name">Nombre</button>
  <button class="sort-btn" onclick="setSort('store')" id="sort-store">Por tienda</button>
  <div class="spacer"></div>
  <div class="view-toggle">
    <button class="view-btn active" title="Cuadrícula" onclick="setView('grid')" id="view-grid">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="0" width="6" height="6" rx="1"/><rect x="8" y="0" width="6" height="6" rx="1"/><rect x="0" y="8" width="6" height="6" rx="1"/><rect x="8" y="8" width="6" height="6" rx="1"/></svg>
    </button>
    <button class="view-btn" title="Lista" onclick="setView('list')" id="view-list">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="0" width="14" height="3" rx="1"/><rect x="0" y="5.5" width="14" height="3" rx="1"/><rect x="0" y="11" width="14" height="3" rx="1"/></svg>
    </button>
  </div>
  <button class="upload-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
    Añadir producto
    <input type="file" id="fileInputMain" accept="image/*" multiple onchange="handleFiles(this.files)">
  </button>
</div>

<div class="main">
  <div class="upload-zone" id="dropZone">
    <input type="file" accept="image/*" multiple onchange="handleFiles(this.files)">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    <h3>Arrastra fotos de lo que quieres comprar</h3>
    <p>La IA identifica el producto y busca los 3 precios más bajos</p>
  </div>

  <div id="productsContainer"></div>
</div>

<script>
const STORAGE_KEY = 'wishlist_v2';
let items = [];
let sortMode = 'added';
let viewMode = 'grid';
let idCounter = Date.now();

// LOAD
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      items = parsed.items || [];
      idCounter = parsed.idCounter || Date.now();
      items.forEach(it => { it.analyzing = false; it.searchingPrices = false; });
    }
  } catch(e) {}
  render();
}

// SAVE
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ items, idCounter }));
    document.getElementById('statSaved').textContent = 'guardado ✓';
    setTimeout(() => document.getElementById('statSaved').textContent = 'ahora', 2000);
  } catch(e) {}
}

// FILES
function handleFiles(files) {
  Array.from(files).filter(f => f.type.startsWith('image/')).forEach(processFile);
}

async function processFile(file) {
  const id = ++idCounter;
  const base64 = await toBase64(file);
  const mediaType = file.type || 'image/jpeg';
  const item = {
    id, base64, mediaType,
    imgData: 'data:' + mediaType + ';base64,' + base64,
    name: 'Analizando...', desc: '', category: '',
    prices: null, analyzing: true, searchingPrices: false,
    addedAt: Date.now()
  };
  items.unshift(item);
  document.getElementById('statCount').textContent = items.length;
  render();

  try {
    const analysis = await analyzeProduct(base64, mediaType);
    item.name = analysis.name;
    item.desc = analysis.description;
    item.category = analysis.category;
    item.analyzing = false;
    item.searchingPrices = true;
    render();

    const prices = await findPrices(analysis.name, analysis.searchQuery, base64, mediaType);
    item.prices = prices;
    item.searchingPrices = false;
    save();
    render();
  } catch(err) {
    item.name = 'Sin identificar';
    item.desc = 'No se pudo analizar. Intenta con otra imagen.';
    item.analyzing = false;
    item.searchingPrices = false;
    save();
    render();
  }
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function analyzeProduct(base64, mediaType) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: 'Analiza el producto en esta imagen. Responde SOLO con JSON válido sin markdown:\n{"name":"nombre completo con marca y modelo","description":"descripción breve 1-2 líneas","category":"categoría","searchQuery":"términos para buscar en tiendas online de España"}' }
        ]
      }]
    })
  });
  const data = await resp.json();
  const text = data.content.map(b => b.text||'').join('');
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

async function findPrices(name, searchQuery, base64, mediaType) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: `Busca "${searchQuery}" en tiendas online de España. Encuentra las 3 tiendas con el precio más bajo. Responde SOLO con JSON sin markdown:\n{"stores":[{"rank":1,"store":"Nombre","price":"XX,XX €","url":"https://..."},{"rank":2,"store":"Nombre","price":"XX,XX €","url":"https://..."},{"rank":3,"store":"Nombre","price":"XX,XX €","url":"https://..."}],"note":"nota breve"}` }
        ]
      }]
    })
  });
  const data = await resp.json();
  const text = data.content.map(b => b.type==='text'?b.text:'').filter(Boolean).join('');
  try { return JSON.parse(text.replace(/```json|```/g,'').trim()); }
  catch { return { stores: [], note: 'No se encontraron precios.' }; }
}

function removeItem(id) {
  items = items.filter(i => i.id !== id);
  document.getElementById('statCount').textContent = items.length;
  save();
  render();
}

async function refreshPrices(id) {
  const item = items.find(i => i.id === id);
  if (!item || item.analyzing || item.searchingPrices) return;
  item.searchingPrices = true;
  item.prices = null;
  render();
  const prices = await findPrices(item.name, item.name, item.base64, item.mediaType);
  item.prices = prices;
  item.searchingPrices = false;
  save();
  render();
}

function setSort(mode) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + mode).classList.add('active');
  render();
}

function setView(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + mode).classList.add('active');
  render();
}

function getLowestPrice(item) {
  if (!item.prices || !item.prices.stores || !item.prices.stores.length) return Infinity;
  const p = item.prices.stores[0].price || '';
  const num = parseFloat(p.replace(/[^\d,\.]/g,'').replace(',','.'));
  return isNaN(num) ? Infinity : num;
}

function getSortedItems() {
  const copy = [...items];
  if (sortMode === 'added') return copy;
  if (sortMode === 'price-asc') return copy.sort((a,b) => getLowestPrice(a) - getLowestPrice(b));
  if (sortMode === 'price-desc') return copy.sort((a,b) => getLowestPrice(b) - getLowestPrice(a));
  if (sortMode === 'name') return copy.sort((a,b) => a.name.localeCompare(b.name));
  if (sortMode === 'store') return copy;
  return copy;
}

function buildPricesHTML(item) {
  if (item.analyzing) return `<div class="card-prices"><div class="prices-loading"><span class="pulse">●</span> Identificando producto...</div></div>`;
  if (item.searchingPrices) return `<div class="card-prices"><div class="prices-loading"><span class="pulse">●</span> Buscando mejores precios...</div></div>`;
  if (!item.prices || !item.prices.stores || !item.prices.stores.length) {
    return `<div class="card-prices"><div class="prices-loading">Sin precios — <button class="refresh-btn" onclick="refreshPrices(${item.id})" style="display:inline;border:none;background:none;cursor:pointer;color:#C0392B;padding:0;font-size:13px;">Buscar de nuevo</button></div></div>`;
  }
  const rows = item.prices.stores.map((s,i) => `
    <div class="price-row">
      <div class="price-rank r${i+1}">${i+1}</div>
      <div class="price-store">${s.store}</div>
      <div class="price-amount">${s.price}</div>
      ${s.url ? `<a class="price-link" href="${s.url}" target="_blank" title="Ver en tienda">↗</a>` : ''}
    </div>`).join('');
  const note = item.prices.note ? `<div class="price-note">${item.prices.note}</div>` : '';
  const bestUrl = item.prices.stores[0] && item.prices.stores[0].url ? item.prices.stores[0].url : '#';
  return `<div class="card-prices">
    <div class="prices-title">Mejores precios encontrados</div>
    ${rows}
    ${note}
    <button class="refresh-btn" onclick="refreshPrices(${item.id})">↻ Actualizar precios</button>
    <a class="buy-btn" href="${bestUrl}" target="_blank" ${bestUrl==='#'?'onclick="return false"':''}>
      Comprar al mejor precio — ${item.prices.stores[0].price}
    </a>
  </div>`;
}

function buildCardHTML(item) {
  const statusText = item.analyzing ? 'Analizando...' : item.searchingPrices ? 'Buscando precios...' : '✓ Listo';
  const badgeClass = item.analyzing || item.searchingPrices ? (item.analyzing ? 'badge-analyzing' : 'badge-searching') : 'badge-done';
  return `
    <div class="product-card" id="card-${item.id}">
      <div class="card-img-wrap">
        <img class="card-img" src="${item.imgData}" alt="${item.name}" onerror="this.style.display='none'">
        <div class="card-badge ${badgeClass}">${statusText}</div>
        <button class="card-remove" onclick="removeItem(${item.id})" title="Eliminar">✕</button>
      </div>
      <div class="card-body">
        <div class="card-name">${item.name}</div>
        ${item.desc ? `<div class="card-desc">${item.desc}</div>` : ''}
        ${item.category ? `<div class="card-category">${item.category}</div>` : ''}
      </div>
      ${buildPricesHTML(item)}
    </div>`;
}

function renderByStore(sorted) {
  const storeMap = {};
  sorted.forEach(item => {
    if (item.prices && item.prices.stores && item.prices.stores.length) {
      const store = item.prices.stores[0].store;
      if (!storeMap[store]) storeMap[store] = [];
      storeMap[store].push(item);
    } else {
      if (!storeMap['Sin precio']) storeMap['Sin precio'] = [];
      storeMap['Sin precio'].push(item);
    }
  });
  return Object.entries(storeMap).map(([store, storeItems]) => `
    <div class="stores-section">
      <div class="store-header">
        <div class="store-name">${store}</div>
        <div class="store-count">${storeItems.length} producto${storeItems.length>1?'s':''}</div>
      </div>
      <div class="products-grid ${viewMode==='list'?'list-view':''}">
        ${storeItems.map(buildCardHTML).join('')}
      </div>
    </div>`).join('');
}

function render() {
  document.getElementById('statCount').textContent = items.length;
  const container = document.getElementById('productsContainer');
  if (items.length === 0) {
    container.innerHTML = `<div class="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <h3>Tu lista de deseos está vacía</h3>
      <p>Sube una foto de cualquier producto para empezar</p>
    </div>`;
    return;
  }
  const sorted = getSortedItems();
  if (sortMode === 'store') {
    container.innerHTML = renderByStore(sorted);
  } else {
    container.innerHTML = `<div class="products-grid ${viewMode==='list'?'list-view':''}">${sorted.map(buildCardHTML).join('')}</div>`;
  }
}

// DRAG & DROP
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag');
  Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')).forEach(processFile);
});

load();
</script>
</body>
</html>
